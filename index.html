<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/bodega-pos/">

  <script>
    // Bulletproof PWA Cache-Busting & SW Auto-Unregistration
    (function() {
      var currentVersion = 'v1.0.3_iva_rollback_refresh';
      if (window.localStorage && window.localStorage.getItem('web_demo_app_version') !== currentVersion) {
        console.log('Detected new app version. Clearing PWA caches and service workers...');
        // Unregister all service workers
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var i = 0; i < registrations.length; i++) {
              registrations[i].unregister();
              console.log('Unregistered SW:', registrations[i]);
            }
          });
        }
        // Delete all cache storage keys (where main.dart.js is aggressively cached)
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            for (var i = 0; i < keys.length; i++) {
              caches.delete(keys[i]);
              console.log('Deleted cache store:', keys[i]);
            }
          });
        }
        window.localStorage.setItem('web_demo_app_version', currentVersion);
        // Delay reload slightly to allow unregistrations and deletions to complete
        setTimeout(function() {
          console.log('Reloading page fresh from server...');
          window.location.reload(true);
        }, 300);
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-title" content="bodega_pos_web_demo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>bodega_pos_web_demo</title>
  <link rel="manifest" href="manifest.json">
</head>

</body>
</html>
